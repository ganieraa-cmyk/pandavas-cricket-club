<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Match - Pandavas CC</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Pandavas Cricket Club</h1>
<div class="match-setup">
  <input type="text" id="teamA" placeholder="Team A">
  <input type="text" id="teamB" placeholder="Team B">

  <button id="startMatch">Start Match</button>
</div>

<hr>
<div id="scoreboard">
  <h2 id="score">0/0</h2>
  <h3 id="overs">0.0 Overs</h3>
</div>

<div class="buttons">
  <button onclick="addRun(0)">0</button>
  <button onclick="addRun(1)">1</button>
  <button onclick="addRun(2)">2</button>
  <button onclick="addRun(3)">3</button>
  <button onclick="addRun(4)">4</button>
  <button onclick="addRun(6)">6</button>
  <button onclick="addWicket()">W</button>
  <button onclick="addWide()">WD</button>
<button onclick="addNoBall()">NB</button>
<button onclick="undoLast()">UNDO</button>
</div>

<script type="module" src="js/match.js"></script>

</body>
</html>

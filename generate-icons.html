<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title>
<style>
body { background: #0A0A0A; color: #FFD700; font-family: sans-serif; padding: 20px; }
.icon-grid { display: grid; grid-template-columns: repeat(auto-fit, 120px); gap: 20px; }
.icon-item { background: #1A1A1A; padding: 15px; border-radius: 12px; text-align: center; border: 2px solid #FFD700; }
.icon-item canvas { display: block; margin: 0 auto; }
button { background: #FFD700; color: #0A0A0A; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 20px 0; }
.download-all { display: block; margin: 20px auto; }
</style>
</head>
<body>
<h1>🏏 Generate PWA Icons</h1>
<button class="download-all" onclick="downloadAll()">📥 Download All Icons</button>
<div class="icon-grid" id="grid"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const grid = document.getElementById('grid');
const icons = [];

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Background
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, size, size);
  
  // Gold border
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = size * 0.03;
  ctx.strokeRect(size * 0.05, size * 0.05, size * 0.9, size * 0.9);
  
  // Emoji
  ctx.fillStyle = '#FFD700';
  ctx.font = `${size * 0.35}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏏', size/2, size * 0.45);
  
  // Text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${size * 0.07}px Arial`;
  ctx.fillText('Pandavas', size/2, size * 0.75);
  ctx.fillStyle = '#FFD700';
  ctx.font = `bold ${size * 0.055}px Arial`;
  ctx.fillText('CC', size/2, size * 0.88);
  
  const dataUrl = canvas.toDataURL('image/png');
  icons.push({ size, dataUrl });
  
  const div = document.createElement('div');
  div.className = 'icon-item';
  div.innerHTML = `
    <canvas width="${size/2}" height="${size/2}" style="width:${size/2}px;height:${size/2}px;"></canvas>
    <br><small>${size}x${size}</small>
  `;
  const smallCanvas = div.querySelector('canvas');
  const smallCtx = smallCanvas.getContext('2d');
  const img = new Image();
  img.onload = () => smallCtx.drawImage(img, 0, 0, size/2, size/2);
  img.src = dataUrl;
  grid.appendChild(div);
});

function downloadAll() {
  icons.forEach(({ size, dataUrl }) => {
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
  setTimeout(() => alert('✅ All icons downloaded!'), 1000);
}
</script>
</body>
</html>
